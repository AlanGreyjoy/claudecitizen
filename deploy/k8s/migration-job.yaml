apiVersion: batch/v1
kind: Job
metadata:
  name: claudecitizen-migrate
  namespace: claudecitizen
  labels:
    app.kubernetes.io/name: claudecitizen-backend
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claudecitizen-backend
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: claudecitizen-backend
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/example/claudecitizen-backend:replace-me
          imagePullPolicy: IfNotPresent
          args: ["migrate"]
          envFrom:
            - configMapRef:
                name: claudecitizen-backend-config
            - secretRef:
                name: claudecitizen-backend-secrets
          env:
            - name: RUN_MIGRATIONS
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

