apiVersion: v1
kind: Service
metadata:
  name: claudecitizen-backend-http
  namespace: claudecitizen
  labels:
    app.kubernetes.io/name: claudecitizen-backend
spec:
  selector:
    app.kubernetes.io/name: claudecitizen-backend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: claudecitizen-webtransport
  namespace: claudecitizen
  labels:
    app.kubernetes.io/name: claudecitizen-backend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: claudecitizen-backend
  ports:
    - name: webtransport
      port: 443
      targetPort: webtransport
      protocol: UDP

