apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: claudecitizen-backend
  namespace: claudecitizen
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: claudecitizen-backend
  minReplicas: 3
  maxReplicas: 30
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

