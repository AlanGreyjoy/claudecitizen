apiVersion: v1
kind: Secret
metadata:
  name: claudecitizen-backend-secrets
  namespace: claudecitizen
type: Opaque
stringData:
  DATABASE_URL: postgresql://replace-me
  REDIS_URL: redis://replace-me
  JWT_ACCESS_SECRET: replace-with-at-least-32-random-bytes
  JWT_REFRESH_SECRET: replace-with-an-independent-random-secret
  ADMIN_EMAIL: admin@example.com
  ADMIN_PASSWORD: replace-me
  ADMIN_SESSION_SECRET: replace-with-an-independent-random-secret
  DISCORD_CLIENT_ID: ""
  DISCORD_CLIENT_SECRET: ""
  DISCORD_REDIRECT_URI: https://api.claudecitizen.example.com/auth/discord/callback
  SMTP_HOST: smtp.example.com
  SMTP_PORT: "587"
  SMTP_USER: replace-me
  SMTP_PASS: replace-me
  SMTP_FROM: ClaudeCitizen <noreply@example.com>
---
apiVersion: v1
kind: Secret
metadata:
  name: claudecitizen-webtransport-tls
  namespace: claudecitizen
type: kubernetes.io/tls
stringData:
  tls.crt: replace-with-public-certificate-pem
  tls.key: replace-with-private-key-pem

