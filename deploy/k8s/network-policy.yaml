apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claudecitizen-backend
  namespace: claudecitizen
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: claudecitizen-backend
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - ports:
        - port: 3000
          protocol: TCP
        - port: 4433
          protocol: UDP
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 587
          protocol: TCP

